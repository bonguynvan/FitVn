<?xml version="1.0" encoding="UTF-8"?>
<!--
  FitVN source logo.
  512x512 master artwork. Export to the PNG sizes documented in README.md.

  Mark concept: a stylized dumbbell whose bar reads as an upward "growth"
  stroke, set on the FitVN warm coral->orange gradient. The safe zone (the
  central ~80%) keeps the mark intact under Android's maskable circle/squircle.
-->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FitVN">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff8a4c"/>
      <stop offset="0.55" stop-color="#ff6b3d"/>
      <stop offset="1" stop-color="#f1492f"/>
    </linearGradient>
    <linearGradient id="lime" x1="120" y1="360" x2="392" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c6f24a"/>
      <stop offset="1" stop-color="#a8e63a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#7a1f10" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background. Full-bleed so the same artwork works for maskable export. -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle top sheen for depth -->
  <rect width="512" height="512" rx="112" fill="white" fill-opacity="0.06"/>

  <!-- Dumbbell, rotated to imply an upward progress stroke -->
  <g filter="url(#soft)" transform="rotate(-32 256 256)">
    <!-- bar -->
    <rect x="150" y="238" width="212" height="36" rx="18" fill="#fff4ec"/>
    <!-- left plates -->
    <rect x="118" y="206" width="34" height="100" rx="16" fill="#fff4ec"/>
    <rect x="96"  y="226" width="26" height="60"  rx="13" fill="#ffd9c2"/>
    <!-- right plates -->
    <rect x="360" y="206" width="34" height="100" rx="16" fill="#fff4ec"/>
    <rect x="390" y="226" width="26" height="60"  rx="13" fill="#ffd9c2"/>
  </g>

  <!-- Lime "go" accent: a rising tick across the bar -->
  <path d="M150 330 L236 256 L300 300 L392 196"
        stroke="url(#lime)" stroke-width="26" stroke-linecap="round"
        stroke-linejoin="round" fill="none" opacity="0.95"/>

  <!-- Wordmark dot tag -->
  <circle cx="392" cy="196" r="20" fill="url(#lime)"/>
</svg>
